<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台球训练打卡</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-header">
        <h1>台球训练</h1>
        <p id="headerSubtitle">每日打卡与进阶解锁追踪</p>
      </header>

      <main id="tabContent" class="tab-content">
        <section id="checkinTab" class="tab-panel active"></section>
        <section id="recordsTab" class="tab-panel"></section>
        <section id="settingsTab" class="tab-panel"></section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-btn active" data-tab="checkinTab">打卡</button>
        <button class="nav-btn" data-tab="recordsTab">记录</button>
        <button class="nav-btn" data-tab="settingsTab">设置</button>
      </nav>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="/js/checkin-tab.js"></script>
    <script src="/js/records-tab.js"></script>
    <script src="/js/settings-tab.js"></script>
    <script src="/js/index.js"></script>
  </body>
</html>
